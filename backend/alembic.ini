# Alembic 설정 파일
# 파이썬 관점: Django의 migrate 커맨드에 해당하는 마이그레이션 도구

[alembic]
# 마이그레이션 스크립트 위치
script_location = migrations

# 마이그레이션 파일명 형식: 0001_add_users.py 스타일
file_template = %%(rev)s_%%(slug)s

# DATABASE_URL은 env.py에서 settings에서 읽음 (여기서는 비워둠)
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
